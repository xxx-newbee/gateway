name: Build Docker and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 构建并推送 Docker 镜像
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: huangjg/gateway-srv:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 2. SSH 连接服务器拉取镜像并重启
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 拉取最新镜像
            docker pull huangjg/gateway-srv:latest
            
            # 停止旧容器
            docker stop gateway-srv || true
            docker rm gateway-srv || true
            
            # 启动新容器
            docker run -d --name gateway-srv --net go-micro --restart always -v ~/go-micro/gateway-api.yaml:/app/gateway-api.yaml -p 8888:8888 huangjg/gateway-srv:latest -f /app/gateway-api.yaml
            
            # 清理旧镜像 (可选)
            docker image prune -f